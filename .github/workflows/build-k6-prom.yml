name: Build k6 with Prometheus exporter

on:
  push:
    branches: master
    paths:
      - 'build/k6-prom/**'
      - '.github/workflows/build-k6-prom.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Required for linux/arm64 cross-compilation on GitHub-hosted runners
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Get previous tag
        id: previoustag
        uses: "WyriHaximus/github-action-get-previous-tag@master"
        with:
          fallback: 1.0.0

      - name: Build and push multi-platform image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./build/k6-prom/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/rdpanek/k6:${{ steps.previoustag.outputs.tag }}.prom
            ghcr.io/rdpanek/k6:prom.latest
          # BuildKit cache — speeds up repeated builds on GitHub runners
          cache-from: type=gha
          cache-to: type=gha,mode=max
