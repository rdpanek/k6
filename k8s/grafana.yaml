---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: k6
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
      - name: grafana
        image: grafana/grafana
        ports:
        - containerPort: 3000
        volumeMounts:
        - name: datasource
          mountPath: /etc/grafana/provisioning/datasources
        - name: dashboard-provider
          mountPath: /etc/grafana/provisioning/dashboards/dashboard.yaml
          subPath: dashboard.yaml
        - name: dashboard-k6
          mountPath: /etc/grafana/provisioning/dashboards/k6-performance-observability.json
          subPath: k6-performance-observability.json
      volumes:
      - name: datasource
        configMap:
          name: grafana-datasource
      - name: dashboard-provider
        configMap:
          name: grafana-dashboard-provider
      - name: dashboard-k6
        configMap:
          name: grafana-dashboard-k6
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: k6
spec:
  selector:
    app: grafana
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: LoadBalancer
