apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasource
  namespace: k6
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: prometheus
        type: prometheus
        uid: prometheus
        access: proxy
        url: http://prometheus.k6.svc.cluster.local
        isDefault: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: k6
data:
  dashboard.yaml: |
    apiVersion: 1
    providers:
      - name: k6
        type: file
        options:
          path: /etc/grafana/provisioning/dashboards
---
apiVersion: v1
kind: ConfigMap
