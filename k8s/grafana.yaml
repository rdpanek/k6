        {"datasource": {"type": "prometheus","uid": "prometheus"},"description": "Current number of active virtual users","fieldConfig": {"defaults": {"color": {"mode": "palette-classic"},"custom": {"axisBorderShow": false,"axisCenteredZero": false,"axisColorMode": "text","axisLabel": "","axisPlacement": "auto","barAlignment": 0,"drawStyle": "line","fillOpacity": 0,"gradientMode": "opacity","hideFrom": {"legend": false,"tooltip": false,"viz": false},"insertNulls": false,"lineInterpolation": "linear","lineWidth": 1,"pointSize": 1,"scaleDistribution": {"type": "linear"},"showPoints": "auto","showValues": false,"spanNulls": false,"stacking": {"group": "A","mode": "none"},"thresholdsStyle": {"mode": "off"}},"mappings": [],"thresholds": {"mode": "absolute","steps": [{"color": "light-green","value": 0},{"color": "red","value": 300}]}},"overrides": []},"gridPos": {"h": 5,"w": 21,"x": 0,"y": 15},"id": 2,"options": {"legend": {"calcs": [],"displayMode": "list","placement": "bottom","showLegend": true},"tooltip": {"hideZeros": false,"mode": "multi","sort": "none"}},"targets": [{"datasource": {"type": "prometheus","uid": "prometheus"},"editorMode": "code","exemplar": true,"expr": "k6_vus","format": "time_series","instant": false,"legendFormat": "VU total","refId": "VUs"},{"datasource": {"type": "prometheus","uid": "prometheus"},"editorMode": "builder","expr": "k6_vus_max","instant": false,"legendFormat": "VU max","range": true,"refId": "VU max"}],"title": "VU (k6)","type": "timeseries"}
